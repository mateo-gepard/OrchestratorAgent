# Fly.io deployment — runs the FULL Maestro pipeline (planner, parallel
# agents, verifier, adaptive replanning, synthesis), unlike the degraded
# single-agent Vercel mode.
#
#   fly launch --no-deploy                  # registers the app from this file
#   fly volumes create maestro_data --size 1
#   fly secrets set OPENROUTER_API_KEY=sk-or-... MAESTRO_ACCESS_CODE=choose-a-code
#   fly deploy

app = "maestro"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  MAESTRO_DATA_DIR = "/data"
  PORT = "4646"

[mounts]
  source = "maestro_data"
  destination = "/data"

[http_service]
  internal_port = 4646
  force_https = true
  # Runs stream over SSE and can take many minutes — never stop the machine
  # under a live run.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
